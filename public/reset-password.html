<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password — Hey Larmah Exchange</title>
  <link rel="stylesheet" href="./styles.css"/>
  <script src="./config.js"></script>
  <script src="./runtime.js"></script>
</head>
<body>
<div class="topbar"></div>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo-wrap">
      <div class="auth-logo">HL</div>
      <h1>Reset Password</h1>
      <p>Hey Larmah Exchange</p>
    </div>
    <div class="auth-card">
      <div id="resetForm">
        <div class="field" style="position:relative">
          <label>New Password (min 8 characters)</label>
          <input id="np" type="password" placeholder="••••••••" autocomplete="new-password"/>
          <span class="eye-toggle" onclick="togglePwd('np',this)">👁</span>
        </div>
        <div class="field" style="position:relative">
          <label>Confirm New Password</label>
          <input id="np2" type="password" placeholder="••••••••"/>
          <span class="eye-toggle" onclick="togglePwd('np2',this)">👁</span>
        </div>
        <button class="btn btn-primary btn-full" onclick="doReset()" id="resetBtn">Reset Password</button>
        <div id="resetMsg" class="msg"></div>
      </div>
      <div id="noToken" style="display:none;text-align:center;color:var(--red);padding:20px">
        Invalid or missing reset token.<br/>
        <a href="https://heylarmah-exchange.pages.dev/" style="color:var(--amber);margin-top:10px;display:inline-block">← Back to Sign In</a>
      </div>
    </div>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
const appUrl = window.HLX?.appUrl || (path => path);
const sharedApi = window.HLX?.api || (async () => ({ok:false,status:0,j:{error:'Runtime not loaded'}}));
if (!token) {
  document.getElementById('resetForm').style.display='none';
  document.getElementById('noToken').style.display='block';
}
function togglePwd(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type==='password'?'text':'password';
  el.textContent = inp.type==='password'?'👁':'🙈';
}
async function doReset() {
  const btn = document.getElementById('resetBtn');
  const pwd  = document.getElementById('np').value;
  const pwd2 = document.getElementById('np2').value;
  const msg  = document.getElementById('resetMsg');
  if (pwd.length < 8) { msg.textContent='Password must be at least 8 characters'; msg.className='msg err'; return; }
  if (pwd !== pwd2)   { msg.textContent='Passwords do not match'; msg.className='msg err'; return; }
  btn.textContent='Resetting…'; btn.disabled=true;
  const {ok,status,j:data} = await sharedApi('/api/auth/reset-password',{method:'POST',body:JSON.stringify({token,password:pwd})});
  btn.textContent='Reset Password'; btn.disabled=false;
  if (!ok) { msg.textContent=data.error||'Reset failed'; msg.className='msg err'; return; }
  msg.textContent='Password updated! Redirecting to sign in…'; msg.className='msg ok';
  setTimeout(()=>{ window.location.href = appUrl('/'); }, 2000);
}
</script>
</body>
</html>
